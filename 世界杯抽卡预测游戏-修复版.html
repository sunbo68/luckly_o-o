<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界杯抽卡预测</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .loading {
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .team-selector {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        select, button {
            padding: 12px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        
        select {
            background: white;
            color: #333;
            min-width: 200px;
        }
        
        button {
            background: #ff6b6b;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #ff5252;
            transform: scale(1.05);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .card-container {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .team-card {
            width: 150px;
            height: 200px;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .team-card.flipped {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        
        .card-front {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
        }
        
        .card-back {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            transform: rotateY(180deg);
        }
        
        .flag {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .team-name {
            font-weight: bold;
            font-size: 14px;
        }
        
        .result {
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .win-animation {
            animation: winPulse 0.5s ease-in-out 3;
        }
        
        @keyframes winPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .history {
            margin-top: 30px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .vs-text {
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
            color: #ffd700;
        }
        
        .strength-meter {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            background: linear-gradient(to right, #4CAF50, #8BC34A);
            width: 0%;
            transition: width 1s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 世界杯抽卡预测 🏆</h1>
        
        <div class="loading" id="loadingMessage">
            正在获取最新的世界杯参赛队伍信息...
        </div>
        
        <div class="team-selector" id="teamSelector" style="display:none;">
            <h2>选择两支队伍进行对决</h2>
            <select id="team1">
                <option value="">选择主队</option>
            </select>
            
            <select id="team2">
                <option value="">选择客队</option>
            </select>
            
            <br>
            <button onclick="drawCards()" id="drawBtn">🎲 抽卡预测胜负</button>
            <button onclick="resetGame()">🔄 重置</button>
        </div>
        
        <div class="vs-text" id="vsText" style="display:none;">VS</div>
        
        <div class="card-container" id="cardContainer" style="display:none;">
            <div class="team-card" id="card1">
                <div class="card-front">
                    <div class="flag">?</div>
                    <div class="team-name">主队</div>
                </div>
                <div class="card-back" id="back1">
                    <div class="flag" id="flag1"></div>
                    <div class="team-name" id="name1"></div>
                    <div class="strength-meter">
                        <div class="strength-bar" id="strength1"></div>
                    </div>
                </div>
            </div>
            
            <div class="team-card" id="card2">
                <div class="card-front">
                    <div class="flag">?</div>
                    <div class="team-name">客队</div>
                </div>
                <div class="card-back" id="back2">
                    <div class="flag" id="flag2"></div>
                    <div class="team-name" id="name2"></div>
                    <div class="strength-meter">
                        <div class="strength-bar" id="strength2"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="result" id="result" style="display:none;">
            选择两支队伍并点击抽卡按钮来预测比赛结果！
        </div>
        
        <div class="history" id="historySection" style="display:none;">
            <h3>预测历史</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        // 存储所有队伍数据
        let allTeams = [];

        // 模拟从网络获取世界杯队伍信息
        async function fetchWorldCupTeams() {
            // 这里模拟获取2022年世界杯的参赛队伍
            return new Promise((resolve) => {
                setTimeout(() => {
                    const teams = [
                        { name: "巴西", flag: "🇧🇷", strength: 95 },
                        { name: "阿根廷", flag: "🇦🇷", strength: 94 },
                        { name: "法国", flag: "🇫🇷", strength: 93 },
                        { name: "英格兰", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", strength: 92 },
                        { name: "西班牙", flag: "🇪🇸", strength: 91 },
                        { name: "荷兰", flag: "🇳🇱", strength: 90 },
                        { name: "葡萄牙", flag: "🇵🇹", strength: 89 },
                        { name: "比利时", flag: "🇧🇪", strength: 88 },
                        { name: "克罗地亚", flag: "🇭🇷", strength: 87 },
                        { name: "乌拉圭", flag: "🇺🇾", strength: 86 },
                        { name: "丹麦", flag: "🇩🇰", strength: 85 },
                        { name: "德国", flag: "🇩🇪", strength: 84 },
                        { name: "瑞士", flag: "🇨🇭", strength: 83 },
                        { name: "塞内加尔", flag: "🇸🇳", strength: 82 },
                        { name: "威尔士", flag: "🏴󠁧󠁢󠁷󠁬󠁳󠁿", strength: 81 },
                        { name: "美国", flag: "🇺🇸", strength: 80 },
                        { name: "墨西哥", flag: "🇲🇽", strength: 79 },
                        { name: "波兰", flag: "🇵🇱", strength: 78 },
                        { name: "摩洛哥", flag: "🇲🇦", strength: 77 },
                        { name: "日本", flag: "🇯🇵", strength: 76 },
                        { name: "厄瓜多尔", flag: "🇪🇨", strength: 75 },
                        { name: "加纳", flag: "🇬🇭", strength: 74 },
                        { name: "喀麦隆", flag: "🇨🇲", strength: 73 },
                        { name: "韩国", flag: "🇰🇷", strength: 72 }
                    ];
                    resolve(teams);
                }, 1500); // 模拟网络延迟
            });
        }

        // 初始化队伍选择器
        async function initTeamSelector() {
            try {
                // 显示加载信息
                document.getElementById('loadingMessage').textContent = '正在获取最新的世界杯参赛队伍信息...';
                
                // 获取队伍数据
                allTeams = await fetchWorldCupTeams();
                
                // 更新加载信息
                document.getElementById('loadingMessage').textContent = `成功获取 ${allTeams.length} 支世界杯参赛队伍！`;
                
                // 隐藏加载信息，显示选择器
                setTimeout(() => {
                    document.getElementById('loadingMessage').style.display = 'none';
                    document.getElementById('teamSelector').style.display = 'block';
                    document.getElementById('vsText').style.display = 'block';
                    document.getElementById('cardContainer').style.display = 'flex';
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('historySection').style.display = 'block';
                    
                    // 填充选择器
                    const team1Select = document.getElementById('team1');
                    const team2Select = document.getElementById('team2');
                    
                    // 清空现有选项
                    team1Select.innerHTML = '<option value="">选择主队</option>';
                    team2Select.innerHTML = '<option value="">选择客队</option>';
                    
                    // 添加队伍选项
                    allTeams.forEach(team => {
                        const option1 = document.createElement('option');
                        option1.value = team.name;
                        option1.textContent = `${team.flag} ${team.name}`;
                        team1Select.appendChild(option1);
                        
                        const option2 = document.createElement('option');
                        option2.value = team.name;
                        option2.textContent = `${team.flag} ${team.name}`;
                        team2Select.appendChild(option2);
                    });
                }, 1000);
            } catch (error) {
                console.error('获取队伍数据失败:', error);
                document.getElementById('loadingMessage').textContent = '获取队伍数据失败，使用默认队伍列表';
                
                // 使用默认队伍列表
                allTeams = [
                    { name: "巴西", flag: "🇧🇷", strength: 95 },
                    { name: "阿根廷", flag: "🇦🇷", strength: 94 },
                    { name: "法国", flag: "🇫🇷", strength: 93 },
                    { name: "英格兰", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", strength: 92 },
                    { name: "西班牙", flag: "🇪🇸", strength: 91 },
                    { name: "荷兰", flag: "🇳🇱", strength: 90 },
                    { name: "葡萄牙", flag: "🇵🇹", strength: 89 },
                    { name: "比利时", flag: "🇧🇪", strength: 88 },
                    { name: "克罗地亚", flag: "🇭🇷", strength: 87 },
                    { name: "乌拉圭", flag: "🇺🇾", strength: 86 }
                ];
                
                // 填充选择器
                const team1Select = document.getElementById('team1');
                const team2Select = document.getElementById('team2');
                
                allTeams.forEach(team => {
                    const option1 = document.createElement('option');
                    option1.value = team.name;
                    option1.textContent = `${team.flag} ${team.name}`;
                    team1Select.appendChild(option1);
                    
                    const option2 = document.createElement('option');
                    option2.value = team.name;
                    option2.textContent = `${team.flag} ${team.name}`;
                    team2Select.appendChild(option2);
                });
                
                // 隐藏加载信息，显示选择器
                setTimeout(() => {
                    document.getElementById('loadingMessage').style.display = 'none';
                    document.getElementById('teamSelector').style.display = 'block';
                    document.getElementById('vsText').style.display = 'block';
                    document.getElementById('cardContainer').style.display = 'flex';
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('historySection').style.display = 'block';
                }, 1000);
            }
        }

        // 随机生成比赛结果
        function predictMatch(team1, team2) {
            const team1Data = allTeams.find(t => t.name === team1);
            const team2Data = allTeams.find(t => t.name === team2);
            
            if (!team1Data || !team2Data) return null;
            
            // 基于队伍实力的加权随机
            const totalStrength = team1Data.strength + team2Data.strength;
            const randomValue = Math.random() * totalStrength;
            
            let winner, loser;
            if (randomValue <= team1Data.strength) {
                winner = team1Data;
                loser = team2Data;
            } else {
                winner = team2Data;
                loser = team1Data;
            }
            
            // 随机生成比分
            const goalsWinner = Math.floor(Math.random() * 4) + 1; // 1-4球
            const goalsLoser = Math.floor(Math.random() * goalsWinner); // 少于胜队
            
            return {
                winner: winner,
                loser: loser,
                score: `${goalsWinner}-${goalsLoser}`
            };
        }

        // 抽卡动画
        function flipCard(cardId, teamData) {
            const card = document.getElementById(cardId);
            card.classList.add('flipped');
            
            // 设置强度条
            const strengthBar = document.getElementById(`strength${cardId.slice(-1)}`);
            if (strengthBar) {
                strengthBar.style.width = `${teamData.strength}%`;
            }
        }

        // 记录历史
        function addToHistory(matchResult, team1, team2) {
            const historyList = document.getElementById('historyList');
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `
                <strong>${matchResult.winner.name}</strong> ${matchResult.score} 
                <strong>${matchResult.loser.name}</strong> 
                (${team1} vs ${team2})
            `;
            historyList.insertBefore(historyItem, historyList.firstChild);
        }

        // 抽卡预测函数
        function drawCards() {
            const team1 = document.getElementById('team1').value;
            const team2 = document.getElementById('team2').value;
            
            if (!team1 || !team2) {
                alert('请选择两支队伍！');
                return;
            }
            
            if (team1 === team2) {
                alert('请选择不同的两支队伍！');
                return;
            }
            
            // 禁用按钮防止重复点击
            document.getElementById('drawBtn').disabled = true;
            
            // 获取当前选择的队伍数据
            const team1Data = allTeams.find(t => t.name === team1);
            const team2Data = allTeams.find(t => t.name === team2);
            
            // 检查数据是否存在
            if (!team1Data || !team2Data) {
                alert('无法找到所选队伍的数据，请重试！');
                document.getElementById('drawBtn').disabled = false;
                return;
            }
            
            // 显示队伍信息
            document.getElementById('flag1').textContent = team1Data.flag;
            document.getElementById('name1').textContent = team1Data.name;
            document.getElementById('flag2').textContent = team2Data.flag;
            document.getElementById('name2').textContent = team2Data.name;
            
            // 延迟显示结果以产生抽卡效果
            setTimeout(() => {
                // 翻转卡片
                flipCard('card1', team1Data);
                flipCard('card2', team2Data);
                
                setTimeout(() => {
                    // 预测比赛结果
                    const result = predictMatch(team1, team2);
                    
                    if (result) {
                        const resultDiv = document.getElementById('result');
                        resultDiv.innerHTML = `
                            <div style="font-size: 1.5em; margin-bottom: 10px;">🏆 预测结果</div>
                            <div><strong>${result.winner.name}</strong> 获胜！</div>
                            <div>比分: ${result.score}</div>
                            <div style="margin-top: 10px; font-style: italic;">${result.winner.name} 实力值: ${result.winner.strength}, ${result.loser.name} 实力值: ${result.loser.strength}</div>
                        `;
                        
                        // 给获胜方添加动画效果
                        const winningCard = result.winner.name === team1 ? 'card1' : 'card2';
                        document.getElementById(winningCard).classList.add('win-animation');
                        
                        // 添加到历史记录
                        addToHistory(result, team1, team2);
                    }
                    
                    // 重新启用按钮
                    document.getElementById('drawBtn').disabled = false;
                }, 1000);
            }, 500);
        }

        // 重置游戏
        function resetGame() {
            document.getElementById('team1').value = '';
            document.getElementById('team2').value = '';
            document.getElementById('result').innerHTML = '选择两支队伍并点击抽卡按钮来预测比赛结果！';
            
            // 重置卡片状态
            document.querySelectorAll('.team-card').forEach(card => {
                card.classList.remove('flipped', 'win-animation');
            });
            
            // 重置强度条
            document.getElementById('strength1').style.width = '0%';
            document.getElementById('strength2').style.width = '0%';
        }

        // 页面加载完成后初始化
        window.onload = function() {
            initTeamSelector();
        };
    </script>
</body>
</html>
